<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Almoxarifado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">

        <h1>Controle de Almoxarifado</h1>
        <p class="subtitulo">
            Cadastro e gerenciamento de materiais de enfermagem.
        </p>

        <section class="formulario">

            <label for="input-nome">Nome do Material</label>
            <input
                type="text"
                id="input-nome"
                placeholder="Ex: Luvas descartáveis"
            >

            <label for="input-quantidade">Quantidade</label>
            <input
                type="number"
                id="input-quantidade"
                placeholder="Ex: 100"
            >

            <button id="btn-cadastrar">
                Cadastrar Material
            </button>

        </section>

        <section class="listagem">

            <h2>Materiais Cadastrados</h2>

            <table>
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Quantidade</th>
                    </tr>
                </thead>

                <tbody id="lista-materiais">

                </tbody>

            </table>

        </section>

    </main>

    <script src="main.js"></script>

</body>
</html>
